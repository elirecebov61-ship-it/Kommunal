<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kommunal - Abonent Yoxlama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 24px;
            padding: 32px 28px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6C5CE7, #00CEC9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #636e72;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #2d3436;
            margin-bottom: 6px;
        }
        .form-group label i {
            color: #6C5CE7;
            margin-right: 6px;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecf3;
            border-radius: 14px;
            font-size: 16px;
            background: #fafbfc;
            transition: all 0.3s;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #6C5CE7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.12);
            background: white;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #6C5CE7, #00CEC9);
            color: white;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.25);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: #f8f9fc;
            border: 1px solid #e9ecf3;
            display: none;
        }
        .result-box.active {
            display: block;
            animation: fadeUp 0.4s ease;
        }
        .result-box.success {
            border-left: 5px solid #00CEC9;
        }
        .result-box.error {
            border-left: 5px solid #e74c3c;
        }
        .result-box h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .result-box .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e9ecf3;
            font-size: 15px;
        }
        .result-box .data-row:last-child {
            border-bottom: none;
        }
        .result-box .data-row strong {
            color: #2d3436;
        }
        .result-box .data-row span {
            color: #636e72;
            font-weight: 500;
        }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 16px;
        }
        .spinner.active {
            display: block;
        }
        .spinner i {
            font-size: 32px;
            color: #6C5CE7;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #b2bec3;
        }
        .footer i {
            color: #6C5CE7;
        }
        .alias-testing {
            background: #e8f0fe;
            border: 1px solid #6C5CE7;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 13px;
            color: #2d3436;
            display: none;
        }
        .alias-testing i {
            color: #6C5CE7;
            margin-right: 6px;
        }
        .alias-testing .success {
            color: #00CEC9;
            font-weight: 600;
        }
        .alias-testing .error {
            color: #e74c3c;
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>

    <div class="container">
        <div class="logo">
            <h1><i class="fas fa-home"></i> Kommunal</h1>
            <p>Abonent məlumatlarını yoxla</p>
        </div>

        <form id="abonentForm" onsubmit="return false;">
            <div class="form-group">
                <label><i class="fas fa-building"></i> Xidmət</label>
                <select id="xidmet" required>
                    <option value="azerigaz_ehali">Azəriqaz (Əhali)</option>
                    <option value="azerishiq_e" selected>Azərişiq (Əhali)</option>
                    <option value="azeristilik_ehali">Azəristilik</option>
                    <option value="azersu_ehali">ADSEA - Azersu (Əhali)</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Abonent kodu</label>
                <input type="text" id="subscriberId" placeholder="Məsələn: 091200400030142" required />
                <small style="color:#636e72;font-size:12px;display:block;margin-top:4px;">Azərişiq abonent nömrəsi</small>
            </div>

            <div class="spinner" id="spinner">
                <i class="fas fa-spinner"></i>
            </div>

            <button type="button" class="btn" id="checkBtn">
                <i class="fas fa-search"></i> Yoxla
            </button>
        </form>

        <div class="alias-testing" id="aliasTesting">
            <i class="fas fa-flask"></i>
            <span id="aliasStatus">Alias sınaqları aparılır...</span>
        </div>

        <div class="result-box" id="resultBox">
            <h3 id="resultTitle"><i class="fas fa-user"></i> Məlumatlar</h3>
            <div id="resultContent"></div>
        </div>

        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Məlumatlar Portmanat API-dən gəlir</p>
            <p>© 2026 - Test məqsədi ilə</p>
        </div>
    </div>

    <script>
        // Bütün alias dəyərləri
        const ALIAS_LIST = [
            'azerishiq_e',
            'azerishiq_ehali',
            'azerishiq',
            'azerishiq_ahali'
        ];

        let foundAlias = null;
        let isTesting = false;

        document.getElementById('checkBtn').addEventListener('click', async function() {
            const subscriberId = document.getElementById('subscriberId').value.trim();
            const selectedAlias = document.getElementById('xidmet').value;

            if (!subscriberId) {
                alert('Zəhmət olmasa, abonent kodunu daxil edin!');
                return;
            }

            // Əgər seçilmiş alias varsa, onu sına
            if (selectedAlias && selectedAlias !== '') {
                await testAlias(subscriberId, selectedAlias);
                return;
            }

            // Əks halda bütün alias-ları sına
            await testAllAliases(subscriberId);
        });

        async function testAllAliases(subscriberId) {
            isTesting = true;
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('spinner').classList.add('active');
            document.getElementById('resultBox').classList.remove('active', 'success', 'error');
            document.getElementById('aliasTesting').style.display = 'block';

            const aliasStatus = document.getElementById('aliasStatus');
            foundAlias = null;

            for (let i = 0; i < ALIAS_LIST.length; i++) {
                const alias = ALIAS_LIST[i];
                aliasStatus.innerHTML = `Sınaq ${i+1}/${ALIAS_LIST.length}: <strong>${alias}</strong> ...`;

                try {
                    const response = await fetch('/.netlify/functions/proxy', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            subscriberId: subscriberId,
                            payment_type: "2",
                            alias: alias,
                            lang: "az",
                            amount: null,
                            binding: 0,
                            agree: false,
                            rrn: generateRRN()
                        })
                    });

                    const cavab = await response.json();

                    if (cavab.status === 'success' && cavab.data) {
                        foundAlias = alias;
                        aliasStatus.innerHTML = `✅ <span class="success">İŞLƏDİ!</span> Alias: <strong>${alias}</strong>`;
                        showResult(cavab, alias);
                        break;
                    } else {
                        aliasStatus.innerHTML = `❌ <span class="error">İşləmədi</span> - ${alias}: ${cavab.message || 'Xəta'}`;
                    }

                } catch (error) {
                    aliasStatus.innerHTML = `❌ <span class="error">Xəta</span> - ${alias}: Şəbəkə problemi`;
                }

                // Hər sınaq arasında qısa gözləmə
                await new Promise(r => setTimeout(r, 300));
            }

            if (!foundAlias) {
                aliasStatus.innerHTML = `❌ <span class="error">Heç bir alias işləmədi!</span> Zəhmət olmasa, doğru alias-ı əl ilə seçin.`;
            }

            document.getElementById('spinner').classList.remove('active');
            document.getElementById('checkBtn').disabled = false;
            isTesting = false;
        }

        async function testAlias(subscriberId, alias) {
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('spinner').classList.add('active');
            document.getElementById('resultBox').classList.remove('active', 'success', 'error');
            document.getElementById('aliasTesting').style.display = 'block';
            document.getElementById('aliasStatus').innerHTML = `Sınaq: <strong>${alias}</strong> ...`;

            try {
                const response = await fetch('/.netlify/functions/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        subscriberId: subscriberId,
                        payment_type: "2",
                        alias: alias,
                        lang: "az",
                        amount: null,
                        binding: 0,
                        agree: false,
                        rrn: generateRRN()
                    })
                });

                const cavab = await response.json();

                if (cavab.status === 'success' && cavab.data) {
                    document.getElementById('aliasStatus').innerHTML = `✅ <span class="success">İŞLƏDİ!</span> Alias: <strong>${alias}</strong>`;
                    showResult(cavab, alias);
                } else {
                    document.getElementById('aliasStatus').innerHTML = `❌ <span class="error">İşləmədi</span> - ${cavab.message || 'Xəta'}`;
                    showError(cavab.message || 'Abonent kodu səhvdir və ya tapılmadı.');
                }

            } catch (error) {
                document.getElementById('aliasStatus').innerHTML = `❌ <span class="error">Şəbəkə xətası!</span>`;
                showError('Serverə qoşulmaq mümkün olmadı.');
            }

            document.getElementById('spinner').classList.remove('active');
            document.getElementById('checkBtn').disabled = false;
        }

        function showResult(cavab, alias) {
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            const resultTitle = document.getElementById('resultTitle');

            resultBox.className = 'result-box active success';
            resultTitle.innerHTML = `✅ Məlumatlar tapıldı! (Alias: ${alias})`;

            const data = cavab.data;
            let html = '';
            if (data.name) html += `<div class="data-row"><strong>Ad:</strong> <span>${data.name}</span></div>`;
            if (data.balance) html += `<div class="data-row"><strong>Balans:</strong> <span>${data.balance} AZN</span></div>`;
            if (data.operator) html += `<div class="data-row"><strong>Operator:</strong> <span>${data.operator}</span></div>`;
            if (data.address) html += `<div class="data-row"><strong>Ünvan:</strong> <span>${data.address}</span></div>`;
            if (data.tariff) html += `<div class="data-row"><strong>Tarif:</strong> <span>${data.tariff}</span></div>`;
            if (data.end_time) html += `<div class="data-row"><strong>Bitmə vaxtı:</strong> <span>${data.end_time}</span></div>`;
            if (data.total_debt) html += `<div class="data-row"><strong>Ümumi borc:</strong> <span>${data.total_debt} AZN</span></div>`;
            if (data.subscriber) html += `<div class="data-row"><strong>Abonent:</strong> <span>${data.subscriber}</span></div>`;

            if (!html) {
                html = `<div class="data-row"><span>Məlumat tapılmadı.</span></div>`;
            }
            resultContent.innerHTML = html;
        }

        function showError(message) {
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            const resultTitle = document.getElementById('resultTitle');

            resultBox.className = 'result-box active error';
            resultTitle.innerHTML = '❌ Xəta!';
            resultContent.innerHTML = `
                <div class="data-row"><span>${message}</span></div>
            `;
        }

        function generateRRN() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                var v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        document.getElementById('subscriberId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('checkBtn').click();
            }
        });
    </script>

</body>
</html>
